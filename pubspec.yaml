name: modular_api
description: Use-case centric API toolkit for Dart — Shelf UseCase base class, HTTP adapters, CORS middleware, and automatic OpenAPI documentation.
version: 0.4.0

repository: https://github.com/macss-dev/modular_api_dart
homepage: https://github.com/macss-dev/modular_api_dart
issue_tracker: https://github.com/macss-dev/modular_api_dart/issues
documentation: https://pub.dev/documentation/modular_api/latest

environment:
  sdk: ">=3.3.0 <4.0.0"
  
dependencies:
  shelf: ^1.4.2
  shelf_router: ^1.1.4

dev_dependencies:
  http: ^1.6.0
  lints: ^5.0.0
  test: ^1.28.0

topics:
  - api
  - openapi
  - macss
