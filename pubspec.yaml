name: modular_api
description: Use case centric API toolkit for Shelf UseCase base class, HTTP adapters, CORS/API-Key middlewares, and OpenAPI specifications.
version: 0.0.7

repository: https://github.com/macss-dev/modular_api
homepage: https://github.com/macss-dev/modular_api
issue_tracker: https://github.com/macss-dev/modular_api/issues
documentation: https://pub.dev/documentation/modular_api/latest

environment:
  sdk: ">=3.3.0 <4.0.0"
  
dependencies:
  http: ^1.5.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_swagger_ui: ^2.0.0
  ffi: ^2.1.2
  dotenv: ^4.2.0
  path: ^1.9.0              # Rutas multiplataforma
  cryptography: ^2.7.0       # AES-GCM cifrado en reposo (Dart puro)
  # flutter_secure_storage: Movida fuera del core - las apps Flutter deben agregarla y crear el adapter
  
  # Auth utilities
  bcrypt: ^1.1.3            # Password hashing
  dart_jsonwebtoken: ^2.17.0 # JWT generation and validation
  crypto: ^3.0.5            # SHA-256 token hashing

dev_dependencies:
  ffigen: ^13.0.0
  lints: ^5.0.0
  test: ^1.24.0

topics:
  - api
  - openapi
  - macss
